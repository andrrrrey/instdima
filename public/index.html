:root{
  --bg:#FFFFFF; --soft:#F5F5F7; --ink:#1B1C1F; --ink-2:#83868E; --ink-3:#B6B8BF;
  --line:#ECECEF; --dark:#1B1C1F;
  --c-post:#EEF1F3; --a-post:#5E7386;
  --c-reels:#F2EFF1; --a-reels:#8A6B7B;
  --c-hero:#F1F1F3;
  --s-draft-b:#F1F1F3; --s-draft-t:#83868E;
  --s-work-b:#EAF0F4; --s-work-t:#4A6E86;
  --s-review-b:#F5EEE4; --s-review-t:#8A6B3E;
  --s-fixes-b:#F5EBEE; --s-fixes-t:#8A5A66;
  --s-ready-b:#E9F1EB; --s-ready-t:#4E7A5C;
  --s-pub-b:#1B1C1F;   --s-pub-t:#FFFFFF;
  --s-cancel-b:#F3F3F5; --s-cancel-t:#B6B8BF;
  --r-card:26px; --r-mid:20px; --r-thumb:18px; --r-pill:999px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;overflow-x:hidden}
body{font-family:'Onest',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#E9E9EF;color:var(--ink);-webkit-font-smoothing:antialiased;
  display:flex;justify-content:center;min-height:100dvh}
.i{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;display:block}
.i .fill{fill:currentColor;stroke:none}
.app{position:relative;width:100%;max-width:440px;height:100dvh;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
@media (min-width:520px){
  body{align-items:center;padding:22px 0}
  .app{height:min(920px,calc(100dvh - 44px));border-radius:34px;box-shadow:0 30px 70px rgba(20,22,30,.22);border:1px solid rgba(0,0,0,.04)}
}

/* ---- шапка ---- */
.topbar{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:calc(env(safe-area-inset-top,0px) + 16px) 18px 8px}
.avatar{width:44px;height:44px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:14px;border:0;cursor:pointer;font-family:inherit;position:relative}
.avatar .sw-dot{position:absolute;right:-1px;bottom:-1px;width:15px;height:15px;border-radius:50%;background:var(--bg);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink)}
.avatar .sw-dot .i{width:9px;height:9px;stroke-width:3}
.hi{flex:1;min-width:0;line-height:1.2}
.hi h1{margin:0;font-size:20px;font-weight:800;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hi span{font-size:12.5px;color:var(--ink-2);font-weight:600}
.circle-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid var(--line);background:var(--bg);color:var(--ink);
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.circle-btn .i{width:20px;height:20px}

/* меню ролей (демо) */
.rolemenu{position:absolute;top:calc(env(safe-area-inset-top,0px) + 62px);left:18px;z-index:45;background:var(--bg);
  border:1px solid var(--line);border-radius:20px;box-shadow:0 16px 40px rgba(20,22,30,.18);padding:6px;min-width:236px;
  opacity:0;transform:translateY(-6px) scale(.98);pointer-events:none;transition:.16s}
.rolemenu.open{opacity:1;transform:none;pointer-events:auto}
.rolemenu .rl{font-size:10.5px;font-weight:800;letter-spacing:.05em;color:var(--ink-3);padding:8px 10px 6px}
.rolemenu button{display:flex;align-items:center;gap:10px;width:100%;border:0;background:none;font-family:inherit;
  padding:9px;border-radius:13px;cursor:pointer;text-align:left}
.rolemenu button:hover,.rolemenu button.on{background:var(--soft)}
.rolemenu .ra{width:32px;height:32px;border-radius:50%;flex:0 0 auto;color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center}
.rolemenu .rt b{display:block;font-size:14px;font-weight:700;line-height:1.25}
.rolemenu .rt span{font-size:11.5px;font-weight:600;color:var(--ink-2)}

.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 0 120px}
.view{display:none}
.view.on{display:block}

/* ---- верхние вкладки ---- */
.tabs{display:flex;gap:6px;padding:8px 18px 4px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{flex:0 0 auto;border:1.5px solid var(--line);background:var(--bg);color:var(--ink-2);font-family:inherit;
  font-size:13.5px;font-weight:700;padding:9px 14px;border-radius:var(--r-pill);cursor:pointer;white-space:nowrap;transition:.14s}
.tabs button.on{background:var(--dark);border-color:var(--dark);color:#fff}
.tabs button .n{display:inline-block;margin-left:5px;font-size:11px;font-weight:800;opacity:.65}

/* ---- строка заголовка секции + главная кнопка ---- */
.headbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px 10px}
.headbar h2{margin:0;font-size:19px;font-weight:800;letter-spacing:-.02em}
.headbar .sub{font-size:12px;font-weight:600;color:var(--ink-2);margin-top:3px}
.add-btn{display:inline-flex;align-items:center;gap:6px;border:0;background:var(--dark);color:#fff;font-family:inherit;
  font-size:14px;font-weight:700;padding:10px 15px 10px 12px;border-radius:var(--r-pill);cursor:pointer;white-space:nowrap}
.add-btn:active{transform:scale(.96)}
.add-btn .i{width:17px;height:17px;stroke-width:2.2}

/* ---- счётчики «Контроль» ---- */
.cnts{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:4px 18px 0}
.cnt{border:1px solid var(--line);border-radius:20px;padding:13px;background:var(--bg);cursor:pointer;font-family:inherit;text-align:left;transition:.14s}
.cnt:active{transform:scale(.97)}
.cnt:hover{background:var(--soft)}
.cnt b{display:block;font-size:24px;font-weight:800;letter-spacing:-.02em;line-height:1}
.cnt span{display:block;margin-top:5px;font-size:12px;font-weight:700;color:var(--ink-2)}
.cnt.wide{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between}
.cnt.wide b{font-size:20px}
.cnt.alert b{color:#A9505A}
.cnt.warn b{color:#8A6B3E}

.attn{padding:6px 18px 0}
.attn-h{display:flex;align-items:center;gap:7px;padding:16px 0 10px}
.attn-h h3{margin:0;font-size:16px;font-weight:800;letter-spacing:-.02em}
.attn-h .n{font-size:11.5px;font-weight:800;color:var(--ink-3)}

/* ---- фильтры ---- */
.fbar{display:flex;gap:6px;padding:8px 18px 2px;overflow-x:auto;scrollbar-width:none}
.fbar::-webkit-scrollbar{display:none}
.filter-btn{display:inline-flex;align-items:center;gap:5px;border:1.5px solid var(--line);background:var(--bg);color:var(--ink-2);
  font-family:inherit;font-size:13px;font-weight:700;padding:8px 10px 8px 12px;border-radius:var(--r-pill);cursor:pointer;white-space:nowrap;flex:0 0 auto}
.filter-btn.act{border-color:var(--dark);color:var(--ink);background:var(--bg)}
.filter-btn .chev{width:14px;height:14px;opacity:.5;flex:0 0 auto}
.fchip{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;background:var(--dark);color:#fff;border:0;
  font-family:inherit;font-size:13px;font-weight:700;padding:8px 12px;border-radius:var(--r-pill);cursor:pointer;white-space:nowrap}
.fchip .i{width:14px;height:14px;stroke-width:2.4}
.fsw{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--line);background:var(--bg);color:var(--ink-2);
  font-family:inherit;font-size:13px;font-weight:700;padding:8px 12px;border-radius:var(--r-pill);cursor:pointer;white-space:nowrap;flex:0 0 auto}
.fsw.on{background:var(--dark);border-color:var(--dark);color:#fff}

/* ---- календарь ---- */
.seg2{display:flex;gap:6px;padding:10px 18px 2px}
.seg2 button{flex:1;border:1.5px solid var(--line);background:var(--bg);color:var(--ink-2);font-family:inherit;
  font-size:13.5px;font-weight:700;padding:9px;border-radius:14px;cursor:pointer}
.seg2 button.on{background:var(--dark);border-color:var(--dark);color:#fff}
.datenav{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 18px 8px}
.datenav .lbl{font-size:14.5px;font-weight:800;letter-spacing:-.01em;flex:1;text-align:center}
.datenav button{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--line);background:var(--bg);color:var(--ink);
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.datenav .i{width:15px;height:15px}
.datenav .today-b{width:auto;border-radius:var(--r-pill);padding:0 13px;font-family:inherit;font-size:12.5px;font-weight:700}
.weekstrip{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;padding:0 18px 2px}
.day{position:relative;border:0;background:var(--soft);border-radius:20px;padding:11px 0 10px;cursor:pointer;font-family:inherit;
  display:flex;flex-direction:column;align-items:center;gap:6px;transition:transform .12s}
.day:active{transform:scale(.95)}
.day__dow{font-size:11px;font-weight:700;color:var(--ink-2)}
.day__num{font-size:17px;font-weight:700;line-height:1}
.day__ic{display:flex;gap:3px;height:16px;align-items:center}
.day__ic .i{width:14px;height:14px;stroke-width:2}
.day.today .day__num{color:var(--a-post)}
.day.sel{background:var(--dark)}
.day.sel .day__dow{color:rgba(255,255,255,.6)}
.day.sel .day__num{color:#fff}
.day.sel .day__ic *{color:#fff!important}
.monthcal{padding:2px 18px 0}
.mc-dows{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.mc-dows span{text-align:center;font-size:11px;font-weight:700;color:var(--ink-3)}
.mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.mc-cell{position:relative;aspect-ratio:1/1;border:0;background:transparent;border-radius:14px;cursor:pointer;font-family:inherit;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.mc-cell.blank{visibility:hidden}
.mc-cell span{font-size:14px;font-weight:600}
.mc-cell.has{background:var(--soft)}
.mc-cell .mdots{display:flex;gap:3px;height:5px}
.mc-cell .mdots i{width:5px;height:5px;border-radius:50%}
.mc-cell.today span{color:var(--a-post)}
.mc-cell.sel{background:var(--dark)}
.mc-cell.sel span{color:#fff}

/* ---- карточка публикации ---- */
.cards{padding:10px 18px 0;display:flex;flex-direction:column;gap:12px}
.pc{border:1px solid var(--line);border-radius:var(--r-card);overflow:hidden;background:var(--bg);animation:pop .26s ease both}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.pc__top{display:flex;gap:12px;padding:13px;cursor:pointer}
.pc__thumb{width:66px;height:82px;border-radius:15px;flex:0 0 auto;position:relative;overflow:hidden;background-size:cover;background-position:center}
.pc__thumb .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff}
.pc__thumb .play span{width:24px;height:24px;border-radius:50%;background:rgba(23,24,28,.5);display:flex;align-items:center;justify-content:center}
.pc__thumb .play .i{width:10px;height:10px}
.pc__thumb .dur{position:absolute;bottom:4px;right:4px;background:rgba(23,24,28,.62);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:6px}
.pc__m{flex:1;min-width:0}
.pc__r1{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.pill{font-size:10px;font-weight:800;letter-spacing:.03em;padding:3px 9px;border-radius:var(--r-pill);white-space:nowrap}
.pill.type{background:var(--soft);color:var(--ink)}
.pc__title{margin:0 0 6px;font-size:15px;font-weight:800;line-height:1.25;letter-spacing:-.01em;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pc__meta{display:flex;flex-direction:column;gap:3px}
.pc__meta div{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink-2)}
.pc__meta .i{width:13px;height:13px;stroke-width:2;flex:0 0 auto}
.pc__meta b{font-weight:700;color:var(--ink)}
.pc__foot{display:flex;align-items:center;gap:8px;padding:10px 13px;border-top:1px solid var(--line);background:var(--soft);flex-wrap:wrap}
.act{display:inline-flex;align-items:center;gap:6px;border:0;background:var(--dark);color:#fff;font-family:inherit;
  font-size:12.5px;font-weight:700;padding:9px 14px;border-radius:var(--r-pill);cursor:pointer;white-space:nowrap}
.act.ghost{background:var(--bg);border:1.5px solid var(--line);color:var(--ink)}
.act:active{transform:scale(.96)}
.act .i{width:14px;height:14px;stroke-width:2.2}
.pc__sp{flex:1}
.mini{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:var(--bg);color:var(--ink);cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.mini .i{width:17px;height:17px}
.mini:active{transform:scale(.9)}

/* ---- пусто ---- */
.empty{text-align:center;color:var(--ink-2);padding:34px 30px}
.empty .ec{width:58px;height:58px;border-radius:19px;background:var(--soft);display:flex;align-items:center;justify-content:center;margin:0 auto 13px;color:var(--ink-2)}
.empty .ec .i{width:27px;height:27px}
.empty h3{margin:0 0 6px;font-size:16.5px;font-weight:800;color:var(--ink)}
.empty p{margin:0 0 14px;font-size:13.5px;line-height:1.45;font-weight:500}

/* ---- нижнее меню ---- */
.tabbar{position:absolute;left:14px;right:14px;bottom:calc(14px + var(--safe-b));z-index:20;background:var(--bg);
  border:1px solid var(--line);border-radius:26px;box-shadow:0 12px 34px rgba(20,22,30,.12);display:grid;padding:9px 8px}
.tab{background:none;border:0;cursor:pointer;padding:4px 0;display:flex;flex-direction:column;align-items:center;gap:4px;
  color:var(--ink-3);font-family:inherit;font-size:11px;font-weight:600}
.tab .tab__ic{width:44px;height:36px;border-radius:16px;display:flex;align-items:center;justify-content:center;transition:.18s}
.tab .i{width:23px;height:23px}
.tab.on{color:var(--ink)}
.tab.on .tab__ic{background:var(--dark);color:#fff}

/* ---- шторка ---- */
.scrim{position:absolute;inset:0;z-index:40;background:rgba(12,13,18,.44);opacity:0;pointer-events:none;transition:opacity .25s}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{position:absolute;left:0;right:0;bottom:0;z-index:41;background:var(--bg);border-radius:28px 28px 0 0;
  transform:translateY(102%);transition:transform .32s cubic-bezier(.32,.72,0,1);max-height:94%;display:flex;flex-direction:column;
  box-shadow:0 -10px 44px rgba(0,0,0,.18)}
.sheet.show{transform:translateY(0)}
.grip{width:40px;height:5px;border-radius:3px;background:#E1E2E7;margin:10px auto 2px}
.sheet__head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 18px 12px}
.sheet__head h3{margin:0;font-size:18px;font-weight:800;letter-spacing:-.02em}
.sheet__head .hint2{font-size:11.5px;font-weight:600;color:var(--ink-3);margin-top:2px}
.sheet__x{width:34px;height:34px;border-radius:50%;border:0;background:var(--soft);color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.sheet__x .i{width:18px;height:18px}
.sheet__body{padding:4px 18px 8px;overflow-y:auto;overflow-x:hidden}
.sheet__foot{padding:12px 18px calc(18px + var(--safe-b));border-top:1px solid var(--line);display:flex;gap:9px}
.btn-primary{flex:1;border:0;border-radius:17px;padding:15px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;background:var(--dark);color:#fff;letter-spacing:-.01em}
.btn-primary:disabled{opacity:.4}
.btn-ghost{flex:1;border:1.5px solid var(--line);background:var(--bg);color:var(--ink);border-radius:17px;padding:15px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-primary:active,.btn-ghost:active{transform:scale(.99)}

.field{margin-bottom:16px}
.field>label{display:block;font-size:11.5px;font-weight:800;color:var(--ink-3);margin-bottom:8px;letter-spacing:.03em}
.field>label .opt{font-weight:600;color:var(--ink-3);letter-spacing:0}
.seg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.seg button{border:1.5px solid var(--line);background:var(--bg);border-radius:16px;padding:12px 4px;cursor:pointer;font-family:inherit;
  font-size:13px;font-weight:700;color:var(--ink-2);display:flex;flex-direction:column;align-items:center;gap:7px}
.seg button .si{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;color:var(--ink)}
.seg button .si .i{width:20px;height:20px}
.seg button.on{border-color:transparent;color:var(--ink)}
.seg button[data-type=post].on{background:var(--c-post)}
.seg button[data-type=reels].on{background:var(--c-reels)}
.seg button.on .si{background:rgba(255,255,255,.6)}
.row2{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(0,1fr);gap:12px}
input[type=text],input[type=date],input[type=time],textarea,select{width:100%;min-width:0;max-width:100%;border:1.5px solid var(--line);background:var(--bg);
  border-radius:15px;padding:13px 14px;font-size:15px;font-family:inherit;font-weight:500;color:var(--ink)}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--ink)}
textarea{resize:vertical;min-height:78px;line-height:1.45}
select{appearance:none;cursor:pointer}
.uploader{display:flex;align-items:center;gap:13px;border:1.5px dashed #D6D7DD;border-radius:16px;padding:13px;cursor:pointer;background:var(--soft)}
.uploader .up-ico{width:52px;height:52px;border-radius:13px;background:var(--bg);flex:0 0 auto;display:flex;align-items:center;justify-content:center;overflow:hidden;color:var(--ink-2)}
.uploader .up-ico img,.uploader .up-ico video{width:100%;height:100%;object-fit:cover}
.uploader .up-ico .i{width:24px;height:24px}
.uploader .up-txt{font-size:13px;color:var(--ink-2);font-weight:500}
.uploader .up-txt b{display:block;color:var(--ink);font-size:14px;font-weight:700;margin-bottom:2px}
.hint{font-size:11.5px;color:var(--ink-3);font-weight:500;margin-top:7px}
.saved-hint{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;color:var(--ink-3)}
.saved-hint .i{width:13px;height:13px;stroke-width:2.6}

/* блоки в шторке */
.blk{border:1px solid var(--line);border-radius:18px;padding:12px;margin-bottom:16px}
.blk h4{margin:0 0 9px;font-size:11.5px;font-weight:800;letter-spacing:.03em;color:var(--ink-3)}
.cmt{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--line)}
.cmt:last-of-type{border-bottom:0}
.cmt .ca{width:28px;height:28px;border-radius:50%;flex:0 0 auto;color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center}
.cmt .cb b{font-size:12.5px;font-weight:700}
.cmt .cb time{font-size:11px;font-weight:600;color:var(--ink-3);margin-left:5px}
.cmt .cb p{margin:2px 0 0;font-size:13px;line-height:1.4;font-weight:500;color:var(--ink-2)}
.cmt-add{display:flex;gap:8px;margin-top:9px}
.cmt-add input{padding:10px 12px;font-size:13.5px;border-radius:13px}
.cmt-add button{border:0;background:var(--dark);color:#fff;border-radius:13px;padding:0 14px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
.hist{display:flex;flex-direction:column;gap:9px}
.hist .h1x{display:flex;gap:9px;font-size:12.5px;line-height:1.4}
.hist .hd{color:var(--ink-3);font-weight:700;flex:0 0 auto;font-size:11.5px;padding-top:1px}
.hist .ht{font-weight:600;color:var(--ink-2)}
.hist .ht b{color:var(--ink);font-weight:700}

/* меню ••• */
.pop{position:fixed;z-index:60;background:var(--bg);border:1px solid var(--line);border-radius:18px;max-width:min(280px,calc(100vw - 28px));
  box-shadow:0 16px 40px rgba(20,22,30,.2);padding:6px;min-width:210px;display:none}
.pop.show{display:block}
.pop button{display:flex;align-items:center;gap:10px;width:100%;border:0;background:none;font-family:inherit;font-size:14px;
  font-weight:600;color:var(--ink);padding:10px 9px;border-radius:12px;cursor:pointer;text-align:left}
.pop button:hover{background:var(--soft)}
.pop button.danger{color:#A9505A}
.pop .i{width:17px;height:17px;flex:0 0 auto}

/* ---- идеи ---- */
.linkbox{margin:8px 18px 0;background:var(--soft);border:1px solid var(--line);border-radius:var(--r-card);padding:12px}
.linkrow{display:flex;align-items:center;gap:9px;background:var(--bg);border:1.5px solid var(--line);border-radius:15px;padding:0 10px 0 12px;margin-bottom:10px}
.linkrow:focus-within{border-color:var(--ink)}
.linkrow .lico{color:var(--ink-3);display:flex;flex:0 0 auto}
.linkrow .lico .i{width:18px;height:18px}
.linkrow input{border:0;background:none;padding:13px 0;flex:1;min-width:0;font-size:14.5px;border-radius:0}
.linkrow input:focus{outline:none}
.linkrow .paste{border:0;background:var(--soft);color:var(--ink);font-family:inherit;font-size:12.5px;font-weight:700;padding:7px 11px;border-radius:var(--r-pill);cursor:pointer;flex:0 0 auto}
.ic{border:1px solid var(--line);border-radius:var(--r-card);overflow:hidden;background:var(--bg);animation:pop .26s ease both}
.ic.dim{background:var(--soft)}
.ic.dim .ic__thumb{opacity:.55}
.ic__top{display:flex;gap:13px;padding:13px;cursor:pointer}
.ic__thumb{width:74px;height:94px;border-radius:15px;flex:0 0 auto;position:relative;overflow:hidden;background-size:cover;background-position:center}
.ic__thumb .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff}
.ic__thumb .play span{width:26px;height:26px;border-radius:50%;background:rgba(23,24,28,.5);display:flex;align-items:center;justify-content:center}
.ic__thumb .play .i{width:11px;height:11px}
.ic__thumb .dur{position:absolute;bottom:5px;right:5px;background:rgba(23,24,28,.62);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:6px}
.ic__m{flex:1;min-width:0;display:flex;flex-direction:column}
.ic__r1{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.ic__title{margin:0 0 5px;font-size:15px;font-weight:800;line-height:1.25;letter-spacing:-.01em}
.ic__note{margin:0 0 6px;font-size:13px;line-height:1.45;font-weight:500;color:var(--ink);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ic__note b{font-weight:800}
.ic__ai{margin:0 0 8px;font-size:13px;line-height:1.45;font-weight:500;color:var(--ink-2);
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.ic__ai b{color:var(--ink);font-weight:700}
.ic.open .ic__note,.ic.open .ic__ai{-webkit-line-clamp:unset;overflow:visible}
.ic__more{align-self:flex-start;border:0;background:none;padding:2px 0 8px;font-family:inherit;font-size:12px;font-weight:700;color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.ic__more .i{width:13px;height:13px;stroke-width:2.4;transition:transform .2s}
.ic.open .ic__more .i{transform:rotate(180deg)}
.ic__ext{display:none;padding:0 13px 4px}
.ic.open .ic__ext{display:block}
.ic__ext .xb{border-top:1px solid var(--line);padding:11px 0}
.ic__ext .xb h5{margin:0 0 5px;font-size:11px;font-weight:800;letter-spacing:.03em;color:var(--ink-3)}
.ic__ext .xb p{margin:0;font-size:13px;line-height:1.45;font-weight:500;color:var(--ink-2)}
.ic__ext .xb a{font-size:12.5px;font-weight:600;color:var(--a-post);word-break:break-all;text-decoration:none}
.ic__tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:auto}
.ic__tags span{font-size:11.5px;font-weight:600;color:var(--ink-2);background:var(--soft);border-radius:var(--r-pill);padding:3px 9px}
.ic__foot{display:flex;align-items:center;gap:7px;padding:10px 13px;border-top:1px solid var(--line);background:var(--soft);flex-wrap:wrap}
.ic__edit{display:none;flex-direction:column;gap:10px;padding:0 13px 13px}
.ic.editing .ic__edit{display:flex}
.ic.editing .ic__top,.ic.editing .ic__foot,.ic.editing .ic__ext{display:none}
.ic__edit label{font-size:11.5px;font-weight:800;letter-spacing:.02em;color:var(--ink-3);display:block;margin-bottom:6px}
.ie-btns{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ie-btns button{border:0;border-radius:14px;padding:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.ie-btns .ghost{background:var(--bg);border:1.5px solid var(--line);color:var(--ink)}
.ie-btns .solid{background:var(--dark);color:#fff}
.tagpick{display:flex;flex-wrap:wrap;gap:7px}
.tagpick button{border:1.5px solid var(--line);background:var(--bg);color:var(--ink-2);font-family:inherit;font-size:12.5px;
  font-weight:700;padding:7px 12px;border-radius:var(--r-pill);cursor:pointer}
.tagpick button.on{background:var(--dark);border-color:var(--dark);color:#fff}
.tagpick .add{border-style:dashed;border-color:#D6D7DD;color:var(--ink)}
.tagpick input{width:130px;padding:6px 12px;font-size:12.5px;font-weight:600;border-radius:var(--r-pill);border:1.5px solid var(--ink)}
.skel{margin:12px 18px 0;border:1px solid var(--line);border-radius:var(--r-card);padding:13px;display:flex;gap:13px}
.sk{background:linear-gradient(90deg,#F0F0F3 25%,#E7E7EB 50%,#F0F0F3 75%);background-size:200% 100%;animation:sh 1.2s linear infinite;border-radius:8px}
@keyframes sh{from{background-position:200% 0}to{background-position:-200% 0}}
.skel .sk1{width:74px;height:94px;border-radius:15px;flex:0 0 auto}
.skel .col{flex:1;display:flex;flex-direction:column;gap:8px;padding-top:4px}
.skel .col .sk{height:12px}
.skel .w70{width:70%}.skel .w90{width:90%}.skel .w50{width:50%}

/* ---- новости ---- */
.dg-hero{margin:8px 18px 0;background:var(--c-hero);border:1px solid var(--line);border-radius:var(--r-card);padding:18px}
.dg-hero .ey{font-size:11.5px;font-weight:800;color:var(--ink-2);letter-spacing:.03em}
.dg-hero h3{margin:6px 0 4px;font-size:20px;font-weight:800;letter-spacing:-.02em}
.dg-hero .mt{font-size:12.5px;font-weight:600;color:var(--ink-2)}
.dg-hero p{margin:10px 0 14px;font-size:13.5px;line-height:1.5;font-weight:500;color:var(--ink)}
.dg-hero .btn-primary{width:100%}
.nc{border:1px solid var(--line);border-radius:20px;overflow:hidden;background:var(--bg);margin-bottom:10px}
.nc.read{background:var(--soft)}
.nc__h{display:flex;align-items:flex-start;gap:10px;padding:13px;cursor:pointer}
.nc__t{flex:1;min-width:0}
.nc__t span{font-size:10.5px;font-weight:800;letter-spacing:.04em;color:var(--ink-3)}
.nc__t b{display:block;font-size:14.5px;font-weight:800;line-height:1.3;margin-top:3px}
.nc__cv{color:var(--ink-3);flex:0 0 auto;transition:transform .2s}
.nc__cv .i{width:18px;height:18px}
.nc.open .nc__cv{transform:rotate(180deg)}
.nc__b{display:none;padding:0 13px 13px}
.nc.open .nc__b{display:block}
.nb{padding:9px 0;border-top:1px solid var(--line)}
.nb h5{margin:0 0 4px;font-size:11px;font-weight:800;letter-spacing:.03em;color:var(--ink-3)}
.nb p{margin:0;font-size:13.5px;line-height:1.5;font-weight:500;color:var(--ink-2)}
.nb.acc{background:var(--soft);border-radius:13px;padding:11px;border:0;margin-top:9px}
.nb.acc p{color:var(--ink)}
.nsrc{display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:9px;font-size:11.5px;font-weight:700;color:var(--ink-3)}
.nc__acts{display:flex;gap:7px;flex-wrap:wrap;padding-top:10px}
.arch button{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;border:1px solid var(--line);
  background:var(--bg);border-radius:16px;padding:13px;font-family:inherit;cursor:pointer;text-align:left;margin-bottom:8px}
.arch b{font-size:13.5px;font-weight:700;display:block}
.arch span{font-size:12px;font-weight:600;color:var(--ink-2)}
.arch .i{width:17px;height:17px;color:var(--ink-3);flex:0 0 auto}

/* ---- ещё ---- */
.acct{margin:8px 18px 0;display:flex;align-items:center;gap:13px;border:1px solid var(--line);border-radius:var(--r-card);padding:14px;background:var(--soft)}
.acct .ava{width:52px;height:52px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px}
.acct .m{flex:1;min-width:0}
.acct .m b{display:block;font-size:16px;font-weight:800}
.acct .m span{font-size:12.5px;font-weight:600;color:var(--ink-2)}
.rows{margin:12px 18px 0;border:1px solid var(--line);border-radius:var(--r-card);overflow:hidden}
.row{display:flex;align-items:center;gap:12px;padding:14px 13px;border-bottom:1px solid var(--line);background:var(--bg);width:100%;
  border-left:0;border-right:0;border-top:0;font-family:inherit;text-align:left;cursor:pointer}
.row:last-child{border-bottom:0}
.row:hover{background:var(--soft)}
.row .ri{width:34px;height:34px;border-radius:11px;background:var(--soft);display:flex;align-items:center;justify-content:center;flex:0 0 auto;color:var(--ink)}
.row .ri .i{width:18px;height:18px}
.row .rm{flex:1;min-width:0}
.row .rm b{display:block;font-size:14.5px;font-weight:700;line-height:1.25}
.row .rm span{font-size:12px;font-weight:600;color:var(--ink-2)}
.row .rv{font-size:13px;font-weight:700;color:var(--ink-2);flex:0 0 auto}
.row .rc{width:17px;height:17px;color:var(--ink-3);flex:0 0 auto}
.sw{width:46px;height:27px;border-radius:var(--r-pill);background:#DDDEE3;position:relative;flex:0 0 auto;transition:background .2s;cursor:pointer;border:0;padding:0}
.sw::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sw.on{background:var(--dark)}
.sw.on::after{transform:translateX(19px)}
.secttl{padding:20px 18px 8px;font-size:11.5px;font-weight:800;letter-spacing:.05em;color:var(--ink-3)}

/* ---- подтверждение / тост ---- */
.confirm{position:absolute;inset:0;z-index:50;display:none;align-items:center;justify-content:center;padding:28px}
.confirm.show{display:flex}
.confirm .bg{position:absolute;inset:0;background:rgba(12,13,18,.44)}
.confirm .box{position:relative;background:var(--bg);border-radius:24px;max-width:300px;width:100%;overflow:hidden;text-align:center}
.confirm .box h4{margin:0;padding:22px 22px 6px;font-size:17px;font-weight:800}
.confirm .box p{margin:0;padding:0 22px 18px;font-size:13.5px;color:var(--ink-2);font-weight:500;line-height:1.45}
.confirm .btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 18px 18px}
.confirm .btns button{border:0;border-radius:14px;padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.confirm .btns .no{background:var(--soft);color:var(--ink)}
.confirm .btns .yes{background:#B4545E;color:#fff}
.toast{position:absolute;left:50%;bottom:112px;transform:translateX(-50%) translateY(18px);z-index:70;background:var(--dark);color:#fff;
  font-size:13.5px;font-weight:600;padding:12px 20px;border-radius:var(--r-pill);opacity:0;pointer-events:none;transition:.28s;
  max-width:86%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<script>
(function(){
"use strict";

/* ============ API / авторизация ============ */
const API={
  token:null,
  viewAs:null, // суперадмин: «просмотр от имени» пользователя (X-View-As)
  async req(method,path,body,isForm){
    const h={};
    if(this.token)h.authorization="Bearer "+this.token;
    if(this.viewAs)h["x-view-as"]=this.viewAs;
    let payload;
    if(isForm){payload=body;}
    else if(body!==undefined){h["content-type"]="application/json";payload=JSON.stringify(body);}
    const r=await fetch(path,{method,headers:h,body:payload});
    if(!r.ok){let e;try{e=await r.json();}catch(_){e={error:r.status};}const err=new Error(e.error||("http_"+r.status));err.status=r.status;err.data=e;throw err;}
    const ct=r.headers.get("content-type")||"";
    return ct.includes("application/json")?r.json():r;
  },
  get(p){return this.req("GET",p);},
  post(p,b){return this.req("POST",p,b===undefined?{}:b);},
  patch(p,b){return this.req("PATCH",p,b);},
  put(p,b){return this.req("PUT",p,b);},
  del(p){return this.req("DELETE",p);},
  form(p,fd){return this.req("POST",p,fd,true);}
};
const SRV2ROLE={owner:"eva",maker:"maker",customer:"dmitry",fashion:"fashion"};
let ME_ID=null,TEAM=[],CAPS={};
function qparam(n){try{return new URLSearchParams(location.search).get(n);}catch(e){return null;}}

/* Опции ответственного из реальной команды (владелец/мейкеры). */
function ownerOptions(sel){
  const list=TEAM.filter(u=>u.role==="owner"||u.role==="maker");
  return list.map(u=>`<option value="${esc(u.id)}" ${u.id===sel?"selected":""}>${esc(u.name)}</option>`).join("");
}

/* Замена одной публикации в кэше pubs + синхронизация открытой карточки cur. */
function replacePub(r){
  const i=pubs.findIndex(p=>p.id===r.id);
  let target=r;
  if(typeof cur!=="undefined"&&cur&&cur.id===r.id){Object.assign(cur,r);target=cur;}
  if(i>=0)pubs[i]=target;else pubs.push(target);
  return target;
}
function refreshView(){
  if(nav==="plan")renderPlan();
  else if(nav==="ideas")renderIdeas();
  else if(nav==="news")renderNews();
}
async function apiStatus(p,st){
  try{const r=await API.post("/api/publications/"+p.id+"/status",{status:st});replacePub(r);refreshView();}
  catch(e){toast("Не удалось изменить статус");await reloadPubs();refreshView();}
}
async function persistPub(p,patch){
  try{const r=await API.patch("/api/publications/"+p.id,patch);replacePub(r);refreshView();}
  catch(e){toast("Не удалось сохранить");await reloadPubs();refreshView();}
}
async function reloadPubs(){try{pubs=(await API.get("/api/publications")).items;}catch(e){}}
async function reloadIdeas(){try{ideas=(await API.get("/api/ideas")).items;}catch(e){}}
async function reloadDigest(){
  try{
    const cur=await API.get("/api/digest/current");
    if(cur.digest){
      NEWS=cur.digest.items||[];
      DG.range=cur.digest.range||"—";
      DG.summary=cur.digest.summary||"";
      DG.meta=NEWS.length+" обновлений · собрано Claude";
      newsRead=NEWS.filter(n=>n.read).map(n=>n.id);
    }else{NEWS=[];DG.range="—";DG.summary="Дайджест ещё не собран.";DG.meta="—";newsRead=[];}
  }catch(e){}
  try{const a=await API.get("/api/digest/archive");ARCH=(a.items||[]).map(d=>[d.range,d.count+" тем"]);}catch(e){ARCH=[];}
}

function accessDenied(msg){
  document.getElementById("app").innerHTML=
    `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:32px;text-align:center;gap:12px">
      <div style="font-size:40px">🔒</div>
      <h2 style="margin:0;font-size:18px">Доступ ограничен</h2>
      <p style="color:#666;font-size:14px;max-width:280px;margin:0">${esc(msg||"Обратитесь к владельцу контент-плана, чтобы вас добавили в список пользователей.")}</p>
    </div>`;
}

let IS_SUPER=false,REAL_UID=null;
const VIEWAS_KEY="cp_viewas_v1";

// Применяет профиль/роль/права из ответа /api/bootstrap.
function applyIdentity(b){
  Object.assign(PEOPLE,b.people||{});
  TEAM=b.team||[];
  ME_ID=b.user.id;CAPS=b.caps||{};
  rights=b.user.rights||{createPub:false,seeAll:false,createTask:false};
  role=SRV2ROLE[b.user.role]||"eva";
  IS_SUPER=!!b.superadmin;REAL_UID=b.realUserId||b.user.id;
  ROLES[role].who=ME_ID;ROLES[role].name=b.user.name;
  PEOPLE[ME_ID]=PEOPLE[ME_ID]||{n:b.user.name,i:b.user.initials,c:b.user.color};
}
async function loadAllData(){
  await Promise.all([reloadPubs(),reloadIdeas(),reloadDigest()]);
}
function rerenderApp(){
  nav=ROLES[role].nav.includes(nav)?nav:ROLES[role].nav[0];
  planTab=planTabsFor()[0];
  ideaTab="new";
  renderRole();buildNav();goNav(nav);
}
// Переключатель «просмотр от имени» — только для суперадмина.
function setupSwitcher(){
  const rb=$("#roleBtn");
  if(!IS_SUPER){if(rb)rb.style.pointerEvents="none";return;}
  if(rb)rb.style.pointerEvents="";
  buildRoleMenu();
}
async function switchViewAs(uid){
  API.viewAs=(uid===REAL_UID)?null:uid;
  if(API.viewAs)localStorage.setItem(VIEWAS_KEY,API.viewAs);else localStorage.removeItem(VIEWAS_KEY);
  $("#roleMenu").classList.remove("open");
  let b;
  try{b=await API.get("/api/bootstrap");}catch(e){toast("Не удалось переключиться");return;}
  applyIdentity(b);
  await loadAllData();
  rerenderApp();buildRoleMenu();
  toast("Просмотр от имени: "+b.user.name);
}
async function boot(){
  const TG=window.Telegram&&window.Telegram.WebApp;
  if(TG){try{TG.ready();TG.expand();}catch(e){}}
  const initData=TG&&TG.initData?TG.initData:"dev";
  const devTg=qparam("tg")||"1001";
  let auth;
  try{
    auth=await API.post("/api/auth/telegram",{initData,telegramId:(TG&&TG.initDataUnsafe&&TG.initDataUnsafe.user&&TG.initDataUnsafe.user.id)||devTg});
  }catch(e){
    accessDenied(e.status===403?"Ваш аккаунт не в списке пользователей приложения.":"Не удалось авторизоваться. Откройте приложение из Telegram.");
    return;
  }
  API.token=auth.token;
  API.viewAs=localStorage.getItem(VIEWAS_KEY)||null; // сервер игнорирует для не-суперадмина
  let b;
  try{b=await API.get("/api/bootstrap");}catch(e){accessDenied();return;}
  applyIdentity(b);
  await loadAllData();
  setupSwitcher();
  nav=ROLES[role].nav[0];
  planTab=planTabsFor()[0];
  ideaTab="new";
  renderRole();buildNav();goNav(nav);
}

/* ============ иконки ============ */
const IC={
  plan:'<svg class="i" viewBox="0 0 24 24"><rect x="3.5" y="5" width="17" height="15.5" rx="4"/><path d="M3.5 9.5h17M8 3v3.5M16 3v3.5"/></svg>',

  news:'<svg class="i" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="3"/><path d="M7.5 9h9M7.5 12.5h9M7.5 16h5"/></svg>',

  post:'<svg class="i" viewBox="0 0 24 24"><rect x="3.5" y="5" width="17" height="14" rx="4"/><circle cx="8.5" cy="10" r="1.6"/><path d="M4 17l4.5-4.5L12 16l3-3 5 5"/></svg>',
  reels:'<svg class="i" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="5"/><path class="fill" d="M10 9l5.5 3-5.5 3z"/></svg>',
  play:'<svg class="i" viewBox="0 0 24 24"><path class="fill" d="M9 7l9 5-9 5z"/></svg>',
  plus:'<svg class="i" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>',
  down:'<svg class="i" viewBox="0 0 24 24"><path d="M5 9l7 7 7-7"/></svg>',

  right:'<svg class="i" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>',
  check:'<svg class="i" viewBox="0 0 24 24"><path d="M5 12.5l4.5 4.5L19 7.5"/></svg>',

const F={period:"all",type:"all",status:"all",owner:"all",dl:"all",onlyOver:false};
const F_DEF={period:"all",type:"all",status:"all",owner:"all",dl:"all",onlyOver:false};
function activeF(){
  let n=0;
  ["period","type","status","owner","dl"].forEach(k=>{if(F[k]!=="all")n++;});
  if(F.onlyOver)n++;
  return n;
}
function filtered(){
  let L=visiblePubs().slice();
  if(F.period!=="all"){
    const ms=mondayOf(today),me2=addDays(ms,6);
    if(F.period==="week")L=L.filter(p=>p.date>=dkOf(ms)&&p.date<=dkOf(me2));
    if(F.period==="month")L=L.filter(p=>p.date.slice(0,7)===TK.slice(0,7));
  }
  if(F.type!=="all")L=L.filter(p=>p.type===F.type);
  if(F.status!=="all")L=L.filter(p=>p.status===F.status);
  if(isEva()){
    if(F.owner!=="all")L=L.filter(p=>(p.owner||"")===(F.owner==="none"?"":F.owner));
    if(F.dl==="today")L=L.filter(p=>p.deadline===TK);
    if(F.dl==="over")L=L.filter(isOverdue);
    if(F.onlyOver)L=L.filter(isOverdue);
  }
  return L.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
}
function dd(id,label,val,opts,cb){
  const cur=opts.find(o=>o[0]===val);
  return `<button class="filter-btn${val!=="all"?" act":""}" data-dd="${id}">${label}${cur&&val!=="all"?": "+cur[1]:""}
      <svg class="i chev" viewBox="0 0 24 24"><path d="M5 9l7 7 7-7"/></svg></button>`;
}
function renderAll(B){
  const owners=[["all","Все"],["none","Без ответственного"]].concat(["eva","kira","artem"].map(k=>[k,PEOPLE[k].n]));
  const stOpts=[["all","Все"]].concat((isDm()?DM_ST:Object.keys(ST)).map(k=>[k,ST[k].t]));
  const OPT={
    period:[["all","Все"],["week","Эта неделя"],["month","Этот месяц"]],
    type:[["all","Все"],["post","Пост"],["reels","Reels"]],
    status:stOpts, owner:owners,
    dl:[["all","Все"],["today","Сегодня"],["over","Просрочено"]]
  };
  const LBL={period:"Период",type:"Формат",status:"Статус",owner:"Ответственный",dl:"Дедлайн"};
  let bar=dd("period",LBL.period,F.period,OPT.period)+
          dd("type",LBL.type,F.type,OPT.type)+
          dd("status",LBL.status,F.status,OPT.status);
  if(isEva()){
    bar+=dd("owner",LBL.owner,F.owner,OPT.owner)+
         dd("dl",LBL.dl,F.dl,OPT.dl)+
         `<button class="fsw${F.onlyOver?" on":""}" id="onlyOver">Только просроченные</button>`;
  }
  const n=activeF();
  if(n)bar+=`<button class="fchip" id="resetF">Фильтры · ${n} ${IC.close}</button>`;
  const L=filtered();
  B.innerHTML=headbar("Все публикации",L.length+" из "+visiblePubs().length)+
    `<div class="fbar">${bar}</div><div class="cards" id="allList"></div>`;
  wireAdd();
  B.querySelectorAll("[data-dd]").forEach(btn=>{
    const k=btn.dataset.dd;
    btn.addEventListener("click",e=>{
      e.stopPropagation();
      openPop(btn,OPT[k].map(o=>({
        t:(o[0]===F[k]?"✓  ":"")+o[1],
        f:()=>{F[k]=o[0];renderPlan();}
      })));
    });
  });
  const oo=$("#onlyOver");if(oo)oo.addEventListener("click",()=>{F.onlyOver=!F.onlyOver;renderPlan();});
  const rf=$("#resetF");if(rf)rf.addEventListener("click",()=>{Object.assign(F,F_DEF);renderPlan();toast("Фильтры сброшены");});
  const box=$("#allList");
  if(!L.length){box.innerHTML=emptyBox("Ничего не найдено","Измените фильтры или сбросьте их.");return;}
  L.forEach(p=>box.appendChild(pubCard(p)));
}

/* --- Календарь --- */
let calMode="week",selDate=TK,weekStart=mondayOf(today),viewY=today.getFullYear(),viewM=today.getMonth();
function renderCal(B){
  const label=calMode==="week"
    ? fmtD(dkOf(weekStart))+" – "+fmtD(dkOf(addDays(weekStart,6)))
    : MON[viewM]+" "+viewY;
  B.innerHTML=headbar("Календарь")+
    `<div class="seg2">
       <button class="${calMode==="week"?"on":""}" data-m="week">Неделя</button>
       <button class="${calMode==="month"?"on":""}" data-m="month">Месяц</button>
     </div>
     <div class="datenav">
       <button id="pv">${IC.left}</button>
       <span class="lbl">${label}</span>
       <button id="nx">${IC.right}</button>
       <button class="today-b" id="tdy">Сегодня</button>
     </div>
     <div id="calBody"></div>
     <div class="attn"><div class="attn-h"><h3>${selDate===TK?"На сегодня":"На "+fmtD(selDate)}</h3></div></div>
     <div class="cards" id="dayList"></div>`;
  wireAdd();
  B.querySelectorAll(".seg2 button").forEach(b=>b.addEventListener("click",()=>{calMode=b.dataset.m;renderPlan();}));
  $("#pv").addEventListener("click",()=>{
    if(calMode==="week")weekStart=addDays(weekStart,-7);
    else{viewM--;if(viewM<0){viewM=11;viewY--;}}
    renderPlan();
  });
  $("#nx").addEventListener("click",()=>{
    if(calMode==="week")weekStart=addDays(weekStart,7);
    else{viewM++;if(viewM>11){viewM=0;viewY++;}}
    renderPlan();
  });
  $("#tdy").addEventListener("click",()=>{selDate=TK;weekStart=mondayOf(today);viewY=today.getFullYear();viewM=today.getMonth();renderPlan();});
  calMode==="week"?drawWeek():drawMonth();
  const L=visiblePubs().filter(p=>p.date===selDate).sort((a,b)=>a.time.localeCompare(b.time));
  const box=$("#dayList");
  if(!L.length){
    box.innerHTML=emptyBox("На этот день пусто",canCreatePub()?"Нажмите на дату или кнопку «Публикация», чтобы запланировать.":"Публикаций не запланировано.");
    return;
  }
  L.forEach(p=>box.appendChild(pubCard(p)));
}
function tapDate(dk){
  const has=visiblePubs().some(p=>p.date===dk);
  selDate=dk;
  if(!has&&canCreatePub()){renderPlan();openPub(null,dk);return;}
  renderPlan();
}
function drawWeek(){
  const wrap=$("#calBody");
  wrap.innerHTML=`<div class="weekstrip" id="ws"></div>`;
  const ws=$("#ws");
  for(let i=0;i<7;i++){
    const dt=addDays(weekStart,i),dk=dkOf(dt);
    const dp=visiblePubs().filter(p=>p.date===dk);
    const types=[...new Set(dp.map(p=>p.type))].slice(0,2);
    const b=document.createElement("button");
    b.className="day"+(dk===selDate?" sel":"")+(dk===TK?" today":"");
    b.innerHTML=`<span class="day__dow">${DOW[i]}</span><span class="day__num">${dt.getDate()}</span>
      <span class="day__ic">${types.map(t=>`<span style="color:var(--a-${t})">${TYPES[t].ic}</span>`).join("")}</span>`;
    b.addEventListener("click",()=>tapDate(dk));
    ws.appendChild(b);
  }
}
function drawMonth(){
  const wrap=$("#calBody");
  wrap.innerHTML=`<div class="monthcal"><div class="mc-dows">${DOW.map(d=>`<span>${d}</span>`).join("")}</div><div class="mc-grid" id="mg"></div></div>`;
  const g=$("#mg");
  const lead=(new Date(viewY,viewM,1).getDay()+6)%7,days=new Date(viewY,viewM+1,0).getDate();
  for(let i=0;i<lead;i++){const e=document.createElement("div");e.className="mc-cell blank";g.appendChild(e);}
  for(let d=1;d<=days;d++){
    const dk=key(viewY,viewM,d),dp=visiblePubs().filter(p=>p.date===dk);
    const c=document.createElement("button");
    c.className="mc-cell"+(dk===selDate?" sel":"")+(dk===TK?" today":"")+(dp.length?" has":"");
    const types=[...new Set(dp.map(p=>p.type))].slice(0,3);
    c.innerHTML=`<span>${d}</span><span class="mdots">${types.map(t=>`<i style="background:var(--a-${t})"></i>`).join("")}</span>`;
    c.addEventListener("click",()=>tapDate(dk));
    g.appendChild(c);
  }
}

/* --- Список (Дмитрий) --- */
function renderList(B){
  const L=visiblePubs().slice().sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  B.innerHTML=headbar("Список","Ближайшие публикации")+`<div class="cards" id="lst"></div>`;
  const box=$("#lst");
  if(!L.length){box.innerHTML=emptyBox("Пока пусто","Публикации появятся после планирования.");return;}
  L.forEach(p=>box.appendChild(pubCard(p)));
}

function emptyBox(t,p){
  return `<div class="empty"><div class="ec">${IC.plan}</div><h3>${t}</h3><p>${p}</p></div>`;
}

/* ============ карточка публикации ============ */
/* Заполнение превью реальным медиа (кадр видео / изображение). */
function mediaFill(m){
  if(!m||!m.url)return "";
  if(m.kind==="video"){
    // постер-кадр (надёжно на iOS); иначе — <video> с попыткой показать кадр
    if(m.poster)return `<img src="${m.poster}" style="width:100%;height:100%;object-fit:cover" alt="">`;
    return `<video src="${m.url}#t=0.1" muted playsinline preload="metadata" style="width:100%;height:100%;object-fit:cover"></video>`;
  }
  return `<img src="${m.url}" style="width:100%;height:100%;object-fit:cover" alt="">`;
}
/* Полноэкранный просмотр медиа (видео с плеером / изображение). */
function openMediaViewer(m){
  if(!m||!m.url){toast("Медиа не прикреплено");return;}
  $("#sheet2Title").textContent="Медиа";
  $("#sheet2Hint").textContent="";
  $("#sheet2Foot").style.display="none";
  $("#sheet2Body").innerHTML=m.kind==="video"
    ? `<video src="${m.url}" controls playsinline preload="metadata"${m.poster?` poster="${m.poster}"`:""} style="width:100%;max-height:72vh;border-radius:16px;background:#000;display:block"></video>`
    : `<img src="${m.url}" style="width:100%;border-radius:16px;display:block" alt="">`;
  openSheet2();
}

function pubCard(p,reason){
  const T=TYPES[p.type],isV=p.type==="reels",s=ST[p.status],d=dlState(p);
  const el=document.createElement("article");el.className="pc";
  let meta="";
  if(isEva()){
    meta=`<div class="pc__meta">
      <div>${IC.user}${p.owner?`<b>${PEOPLE[p.owner].n}</b>`:"<b>Без ответственного</b>"}</div>
      <div>${IC.clock}Дедлайн: <b>${p.deadline?fmtD(p.deadline):"—"}</b>${d?` · ${d.t}`:""}</div>
      <div>${IC.cmt}${(p.comments||[]).length} · ${IC.hist}<span>${p.updated||"—"}</span></div>
    </div>`;
  }else if(isMaker()){
    meta=`<div class="pc__meta">
      <div>${IC.clock}Мой дедлайн: <b>${p.deadline?fmtD(p.deadline):"—"}</b>${d?` · ${d.t}`:""}</div>
      <div>${IC.cmt}Комментарии: <b>${(p.comments||[]).length}</b></div>
    </div>`;
  }
  el.innerHTML=`
    <div class="pc__top">
      <div class="pc__thumb${p.media&&p.media.url?" has-media":""}" style="background:${grad(p.g)}">
        ${mediaFill(p.media)}
        ${isV?`<span class="play"><span>${IC.play}</span></span>`:""}
        ${isV&&p.dur?`<span class="dur">${p.dur}</span>`:""}
      </div>
      <div class="pc__m">
        <div class="pc__r1">
          <span class="pill type">${T.s}</span>
          <span class="pill" style="background:${s.b};color:${s.c}">${s.t}</span>
          ${reason?`<span class="pill" style="background:var(--s-fixes-b);color:var(--s-fixes-t)">${reason}</span>`:""}
        </div>
        <h3 class="pc__title">${esc(p.title||"Без названия")}</h3>
        <div class="pc__meta"><div>${IC.plan}Выход: <b>${fmtD(p.date)}, ${p.time}</b></div></div>
        ${meta}
      </div>
    </div>
    <div class="pc__foot" id="f-${p.id}"></div>`;
  el.querySelector(".pc__top").addEventListener("click",()=>openPub(p.id));
  if(p.media&&p.media.url){
    const th=el.querySelector(".pc__thumb");
    th.style.cursor="zoom-in";
    th.addEventListener("click",e=>{e.stopPropagation();openMediaViewer(p.media);});
  }
  const f=el.querySelector(".pc__foot");
  buildFoot(f,p);
  return el;
}
function nextAction(p){
  switch(p.status){
    case "draft":return {t:"Начать работу",f:()=>{setStatus(p,"work");renderPlan();toast("Взято в работу");}};
    case "work":return {t:"Продолжить",f:()=>openPub(p.id)};
    case "fixes":return {t:"Внести правки",f:()=>openPub(p.id)};
    case "review":return {t:"Ждёт Еву",f:()=>openPub(p.id)};
    case "ready":return {t:"Отметить опубликованной",f:()=>{p.late=p.deadline<p.date?false:false;setStatus(p,"published");renderPlan();toast("Отмечено опубликованной");}};
    default:return {t:"Открыть",f:()=>openPub(p.id)};
  }
}
function buildFoot(f,p){
  f.innerHTML="";
  const add=(t,cls,fn)=>{const b=document.createElement("button");b.className="act"+(cls?" "+cls:"");b.textContent=t;
    b.addEventListener("click",e=>{e.stopPropagation();fn();});f.appendChild(b);return b;};
  if(isDm()){add("Открыть","ghost",()=>openPub(p.id));return;}
  if(isMaker()){
    const na=nextAction(p);
    if(p.status==="review")add("Открыть","ghost",()=>openPub(p.id));
    else add(na.t,"",na.f);
  }
  if(isEva()){
    if(p.status==="review"){
      add("Согласовать","",()=>{setStatus(p,"ready","Ева согласовала");renderPlan();toast("Согласовано");});
      add("Вернуть на правки","ghost",()=>{setStatus(p,"fixes","Ева вернула на правки");renderPlan();toast("Возвращено на правки");});
    }else add("Открыть","ghost",()=>openPub(p.id));
  }
  const sp=document.createElement("span");sp.className="pc__sp";f.appendChild(sp);
  const m=document.createElement("button");m.className="mini";m.innerHTML=IC.dots;
  m.addEventListener("click",e=>{e.stopPropagation();popFor(m,p);});
  f.appendChild(m);
}
function popFor(anchor,p){
  const it=[];
  if(isEva()){
    it.push({t:"Изменить дедлайн",ic:IC.clock,f:()=>editDeadline(p)});
    it.push({t:"Изменить ответственного",ic:IC.user,f:()=>editOwner(p)});
  }
  it.push({t:"Перенести дату выхода",ic:IC.move,f:()=>editDate(p)});
  it.push({t:"Дублировать",ic:IC.dup,f:async()=>{
    try{const c=await API.post("/api/publications/"+p.id+"/duplicate");pubs.push(c);renderPlan();toast("Дубликат создан");}
    catch(e){toast("Не удалось дублировать");}}});
  if(isEva())it.push({t:"Архивировать",ic:IC.arch,danger:true,f:()=>{
    ask("Архивировать?","«"+p.title+"» будет отменена и скрыта из плана.","Архивировать",()=>{
      setStatus(p,"canceled","Ева архивировала");renderPlan();toast("В архиве");});}});
  openPop(anchor,it);
}
function editDeadline(p){
  promptSheet("Изменить дедлайн","date",p.deadline||TK,v=>{
    persistPub(p,{deadline:v});toast("Дедлайн обновлён");
  });
}
function editDate(p){
  promptSheet("Перенести дату выхода","date",p.date,v=>{
    persistPub(p,{date:v});toast("Дата перенесена");
  });
}
function editOwner(p){
  promptSheet("Ответственный","select",p.owner||"",v=>{
    persistPub(p,{ownerId:v||null});toast("Ответственный обновлён");
  });
}
/* ============ мини-шторка с одним полем ============ */
function promptSheet(title,kind,val,cb){
  $("#sheet2Title").textContent=title;$("#sheet2Hint").textContent="";
  const body=$("#sheet2Body");
  if(kind==="date")body.innerHTML=`<div class="field"><label>ДАТА</label><input type="date" id="pv1" value="${val}"></div>`;
  if(kind==="select")body.innerHTML=`<div class="field"><label>СОТРУДНИК</label><select id="pv1">
    <option value="">Без ответственного</option>
    ${ownerOptions(val)}
  </select></div>`;
  const foot=$("#sheet2Foot");foot.style.display="flex";
  foot.innerHTML=`<button class="btn-ghost" id="pvC">Отмена</button><button class="btn-primary" id="pvS">Сохранить</button>`;
  $("#pvC").addEventListener("click",closeSheet2);
  $("#pvS").addEventListener("click",()=>{const v=$("#pv1").value;closeSheet2();cb(v);});
  openSheet2();
}

/* ============ шторка публикации ============ */
let cur=null,curIsNew=false;
let saveTimer=null;
function markSaved(){
  $("#sheetHint").innerHTML=`<span class="saved-hint">${IC.check} Сохранение…</span>`;
  clearTimeout(saveTimer);
  const target=cur;
  saveTimer=setTimeout(async()=>{
    if(!target||!target.id)return;
    const patch={title:target.title,type:target.type,time:target.time,date:target.date,
      deadline:target.deadline||null,text:target.text,alt:target.alt,tags:target.tags,
      track:target.track,trackAt:target.trackAt,dur:target.dur,g:target.g};
    if(isEva())patch.ownerId=target.owner||null;
    try{
      const r=await API.patch("/api/publications/"+target.id,patch);
      replacePub(r);
      $("#sheetHint").innerHTML=`<span class="saved-hint">${IC.check} Сохранено · ${nowStamp().split(", ")[1]}</span>`;
    }catch(e){$("#sheetHint").innerHTML=`<span class="saved-hint">Не сохранено</span>`;}
  },500);
}
async function openPub(id,dateOverride){
  curIsNew=!id;
  if(id){cur=pubs.find(p=>p.id===id);}
  else{
    const dt=dateOverride||selDate;
    try{
      cur=await API.post("/api/publications",{title:"",type:"post",date:dt,time:"12:00",deadline:dkOf(addDays(parse(dt),-1))});
      pubs.push(cur);
    }catch(e){toast("Не удалось создать публикацию");return;}
  }
  $("#sheetTitle").textContent=curIsNew?"Новая публикация":(isDm()?"Публикация":"Редактирование");
  $("#sheetHint").innerHTML=isDm()?"":`<span class="saved-hint">${IC.check} Сохраняется автоматически</span>`;
  isDm()?buildPubView():buildPubForm();
  buildPubFoot();
  openSheet();
}

        ${mediaFill(p.media)}
        ${p.type==="reels"?`<span class="play"><span>${IC.play}</span></span>`:""}
      </div>
      <div class="pc__m">
        <div class="pc__r1"><span class="pill type">${T.s}</span>
          <span class="pill" style="background:${s.b};color:${s.c}">${s.t}</span></div>
        <h3 class="pc__title" style="font-size:17px">${esc(p.title||"Без названия")}</h3>
        <div class="pc__meta"><div>${IC.plan}Выход: <b>${fmtD(p.date)}, ${p.time}</b></div></div>
      </div>

    ${p.text?`<div class="blk"><h4>ТЕКСТ ПУБЛИКАЦИИ</h4><p style="margin:0;font-size:14px;line-height:1.5">${esc(p.text)}</p></div>`:""}`;

function buildPicker(box,sel){
  box.innerHTML="";
  vocab().forEach(t=>{
    const b=document.createElement("button");b.type="button";b.textContent="#"+t;
    if(sel.has(t))b.classList.add("on");
    b.addEventListener("click",e=>{e.stopPropagation();
      if(sel.has(t)){if(isFash()&&t==="вещи"){toast("Тег «вещи» обязателен");return;}sel.delete(t);}else sel.add(t);
      buildPicker(box,sel);});
    box.appendChild(b);
  });
  const add=document.createElement("button");add.type="button";add.className="add";add.textContent="+ Новый";
  add.addEventListener("click",e=>{
    e.stopPropagation();
    const inp=document.createElement("input");inp.placeholder="хештег";inp.maxLength=24;
    add.replaceWith(inp);inp.focus();
    let done=false;
    const commit=()=>{if(done)return;done=true;
      const v=inp.value.replace(/^#/,"").trim().toLowerCase();
      if(v){if(!vocab().includes(v)){extraTags.push(v);saveTags();}sel.add(v);}
      buildPicker(box,sel);};
    inp.addEventListener("keydown",ev=>{ev.stopPropagation();
      if(ev.key==="Enter"){ev.preventDefault();commit();}
      if(ev.key==="Escape"){done=true;buildPicker(box,sel);}});
    inp.addEventListener("click",ev=>ev.stopPropagation());
    inp.addEventListener("blur",commit);
  });
  box.appendChild(add);
}

function dlIdea(i){
  if(!i.media||!i.media.url){toast("Файл ещё не готов");return;}
  // Абсолютный URL реального медиа + флаг attachment.
  const base=i.media.url.startsWith("http")?i.media.url:(location.origin+i.media.url);
  const url=base+(base.includes("?")?"&":"?")+"download=1";
  const name="idea-"+i.id+((i.media.kind==="video"||i.type==="reels")?".mp4":".jpg");
  const TG=window.Telegram&&window.Telegram.WebApp;
  // 1) Нативная загрузка Telegram (Bot API 8.0+)
  if(TG&&typeof TG.downloadFile==="function"){
    try{TG.downloadFile({url,file_name:name});return;}catch(e){}
  }
  // 2) Открыть во внешнем браузере — там сработает скачивание (attachment)
  if(TG&&typeof TG.openLink==="function"){TG.openLink(url);toast("Открываю файл для сохранения…");return;}
  // 3) Обычный браузер
  const a=document.createElement("a");a.href=url;a.target="_blank";a.rel="noopener";a.download=name;
  document.body.appendChild(a);a.click();a.remove();
}

function drawDigest(){
  const body=$("#sheet2Body");
  body.innerHTML=`<div class="fbar" style="padding:0 0 8px" id="catBar"></div><div id="newsList"></div>`;
  const cb=$("#catBar");
  // Вкладки строим из реально присутствующих в дайджесте категорий (без пустых).
  const present=[...new Set(NEWS.map(n=>n.cat).filter(Boolean))];
  const ordered=CATS.filter(c=>c!=="Все"&&present.includes(c))
    .concat(present.filter(c=>!CATS.includes(c)));
  const tabs=["Все",...ordered];
  if(newsCat!=="Все"&&!present.includes(newsCat))newsCat="Все";
  tabs.forEach(c=>{
    const b=document.createElement("button");
    b.className="fsw"+(c===newsCat?" on":"");
    b.textContent=c;
    b.addEventListener("click",()=>{newsCat=c;drawDigest();});
    cb.appendChild(b);
  });
  const L=NEWS.filter(n=>newsCat==="Все"||n.cat===newsCat);
  const box=$("#newsList");box.innerHTML="";
  if(!L.length){box.innerHTML=`<div class="empty"><h3>Пусто</h3><p>В этой категории обновлений нет.</p></div>`;return;}
  L.forEach((n,idx)=>box.appendChild(newsCard(n,idx===0)));
}

}

    const id=$("#nuId").value.trim(),name=$("#nuName").value.trim(),r=$("#nuRole").value;
    if(!/^\d+$/.test(id)){toast("Укажите числовой Telegram ID");return;}
    if(!name){toast("Укажите имя");return;}
    try{
      const u=await API.post("/api/users",{telegramId:id,name,role:r});
      TEAM.push(u);PEOPLE[u.id]={n:u.name,i:u.initials,c:u.color};
      toast("Участник добавлен");teamSheet();
    }catch(e){toast(e.status===409?"Такой участник уже есть":"Не удалось добавить");}
  });
}
function notifSheet(){
  const items=isDm()?[["Дайджест новостей","Раз в неделю",true],["Публикация вышла","Когда пост опубликован",false]]
    :[["Напоминание о дедлайне","За день до срока",true],["Дайджест новостей","Раз в неделю",true],
      ["Согласование","Когда нужно решение",isEva()],["Комментарии","Ответы в карточках",true]];
  sheet2Simple("Уведомления","",
    `<div class="rows" style="margin:0">${items.map(([t,s,on])=>`<div class="row" style="cursor:default">
      <span class="ri">${IC.bell}</span><span class="rm"><b>${t}</b><span>${s}</span></span>
      <button class="sw${on?" on":""}"></button></div>`).join("")}</div>`);
  $("#sheet2Body").querySelectorAll(".sw").forEach(s=>s.addEventListener("click",()=>s.classList.toggle("on")));
}
function archSheet(list,title){
  sheet2Simple(title,list.length+" материалов",
    list.length?`<div class="cards" style="padding:0" id="arcL"></div>`
    :`<div class="empty"><div class="ec">${IC.arch}</div><h3>Архив пуст</h3><p>Здесь появятся отменённые материалы.</p></div>`);
  const box=$("#arcL");
  if(box)list.forEach(p=>box.appendChild(pubCard(p)));
}
function helpSheet(){
  const txt=isEva()?"Вкладка «Контроль» показывает всё, что требует решения: просрочки, согласования и правки. Дедлайн подготовки и дата выхода — разные поля, поэтому просрочка считается отдельно от публикации."
    :isMaker()?"«Мои задачи» — то, где вы ответственный. Форма сохраняется автоматически: черновик не потеряется. Когда материал готов, нажмите «Отправить на согласование»."
    :"Раздел «План» показывает, что и когда выходит. Внутренние дедлайны и комментарии команды скрыты.";
  sheet2Simple("Помощь",ROLES[role].name,
    `<p style="font-size:14px;line-height:1.55;font-weight:500;color:var(--ink-2);margin:0 0 14px">${txt}</p>
     <div class="blk"><h4>СТАТУСЫ</h4>
     ${(isDm()?DM_ST:Object.keys(ST)).map(k=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0">
       <span class="pill" style="background:${ST[k].b};color:${ST[k].c}">${ST[k].t}</span></div>`).join("")}</div>`);
}

/* ============ старт ============ */
boot();
})();
</script>
