services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: contentplan
      POSTGRES_PASSWORD: contentplan
      POSTGRES_DB: contentplan
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contentplan"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Применение миграций и сидирование перед стартом приложения.
  migrate:
    build: .
    env_file: ./server/.env
    command: sh -c "npx prisma migrate deploy && node prisma/seed.js"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    restart: unless-stopped
    env_file: ./server/.env
    volumes:
      - media:/data/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["node", "src/index.js"]

  worker:
    build: .
    restart: unless-stopped
    env_file: ./server/.env
    volumes:
      - media:/data/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["node", "src/worker.js"]

  # Обратный прокси с автоматическим HTTPS (Let's Encrypt).
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - app

volumes:
  pgdata:
  redisdata:
  media:
  caddydata:
  caddyconfig:
